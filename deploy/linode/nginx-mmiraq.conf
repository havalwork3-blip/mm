# MM IRAQ static landing (multi-page) + CMS API proxy
# Install:
#   sudo cp deploy/linode/nginx-mmiraq.conf /etc/nginx/sites-available/mmiraq
#   sudo ln -sf /etc/nginx/sites-available/mmiraq /etc/nginx/sites-enabled/mmiraq
#   sudo nginx -t && sudo systemctl reload nginx

upstream mnm_django {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mmiraq.com www.mmiraq.com;

    root /var/www/html;
    index index.html;

    client_max_body_size 50M;

    # CMS content/products/contact — same-origin (no CORS issues)
    location /api/ {
        proxy_pass http://mnm_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /media/ {
        alias /srv/mnm/backend/media/;
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
