# MM IRAQ static landing (multi-page)
# Install:
#   sudo cp deploy/linode/nginx-mmiraq.conf /etc/nginx/sites-available/mmiraq
#   sudo ln -sf /etc/nginx/sites-available/mmiraq /etc/nginx/sites-enabled/mmiraq
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name mmiraq.com www.mmiraq.com;

    root /var/www/html;
    index index.html;

    client_max_body_size 10M;

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
