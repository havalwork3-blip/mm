# Install:
#   sudo cp deploy/linode/nginx-mnm.conf /etc/nginx/sites-available/mnm
#   sudo ln -sf /etc/nginx/sites-available/mnm /etc/nginx/sites-enabled/mnm
#   sudo rm -f /etc/nginx/sites-enabled/default
# Edit server_name, root, alias paths, and upstream to match your server.
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: after DNS points here, run certbot --nginx -d your.domain

upstream mnm_django {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /srv/mnm/frontend/dist;
    index index.html;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://mnm_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://mnm_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /srv/mnm/backend/staticfiles/;
    }

    location /media/ {
        alias /srv/mnm/backend/media/;
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
