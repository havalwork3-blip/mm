<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MM IRAQ — بازرگانی ئێکسسواراتی مۆدێرن و ناوازە" />
  <title>MM IRAQ — بەم زووانە</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --base: #0b0f19;
      --base-elevated: #111827;
      --indigo: #6366f1;
      --violet: #8b5cf6;
      --cyan: #22d3ee;
      --cyan-neon: #06b6d4;
      --silver: #cbd5e1;
      --gold: #e8d5a3;
      --gold-soft: #f5e6c8;
      --text-muted: #94a3b8;
      --card-bg: rgba(20, 27, 45, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --purple-shadow: rgba(139, 92, 246, 0.35);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.23, 1, 0.32, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      font-family: "Noto Sans Arabic", system-ui, sans-serif;
      background: var(--base);
      color: #f1f5f9;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ── Deep premium backdrop ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 100% 80% at 50% -20%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 100% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 45%),
        linear-gradient(180deg, var(--base) 0%, #0d1220 50%, var(--base) 100%);
    }

    .scene__grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 85% 75% at 50% 42%, black 15%, transparent 72%);
      -webkit-mask-image: radial-gradient(ellipse 85% 75% at 50% 42%, black 15%, transparent 72%);
      pointer-events: none;
    }

    .scene__noise {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      will-change: transform;
      animation: orb-float var(--dur, 22s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .orb--indigo {
      width: min(62vw, 480px);
      height: min(62vw, 480px);
      top: -12%;
      right: -10%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.55) 0%, transparent 68%);
      --dur: 24s;
    }

    .orb--violet {
      width: min(50vw, 380px);
      height: min(50vw, 380px);
      bottom: -5%;
      left: -12%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.5) 0%, transparent 70%);
      --dur: 20s;
      --delay: -7s;
    }

    .orb--cyan {
      width: min(40vw, 300px);
      height: min(40vw, 300px);
      top: 38%;
      left: 35%;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.35) 0%, transparent 72%);
      --dur: 18s;
      --delay: -11s;
    }

    .orb--accent {
      width: min(28vw, 200px);
      height: min(28vw, 200px);
      top: 15%;
      left: 8%;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.4) 0%, transparent 70%);
      --dur: 26s;
      --delay: -4s;
    }

    @keyframes orb-float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(35px, -30px) scale(1.08); }
      50% { transform: translate(-25px, 25px) scale(0.95); }
      75% { transform: translate(20px, 15px) scale(1.03); }
    }

    /* Nexi-style floating accents */
    .floats {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .float {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.2);
      animation: float-rise var(--dur, 16s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      opacity: 0;
    }

    .float--lg {
      width: var(--size, 64px);
      height: var(--size, 64px);
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.08);
    }

    .float--sm {
      width: var(--size, 6px);
      height: var(--size, 6px);
      background: var(--cyan);
      border: none;
      box-shadow: 0 0 16px rgba(34, 211, 238, 0.5);
    }

    .float--dash {
      width: 2px;
      height: var(--size, 48px);
      border-radius: 2px;
      border: none;
      background: linear-gradient(180deg, transparent, rgba(34, 211, 238, 0.35), transparent);
    }

    @keyframes float-rise {
      0% { opacity: 0; transform: translateY(24px); }
      12% { opacity: var(--peak, 0.5); }
      50% { opacity: var(--peak, 0.35); transform: translateY(-50px); }
      88% { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(-100px); }
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 5vw, 3rem);
    }

    .badge-top {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: clamp(1.25rem, 3vw, 1.75rem);
      padding: 0.45rem 1rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--cyan);
      background: rgba(34, 211, 238, 0.06);
      border: 1px solid rgba(34, 211, 238, 0.18);
      border-radius: 999px;
      animation: fade-up 0.85s var(--ease-out) 0.1s both;
    }

    .badge-top::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.6; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    /* ── Glass card + animated border ── */
    .card-wrap {
      perspective: 1400px;
      width: min(100%, 580px);
      --rx: 0deg;
      --ry: 0deg;
    }

    @property --border-angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes border-spin {
      to { --border-angle: 360deg; }
    }

    .card-shell {
      position: relative;
      border-radius: 30px;
      padding: 1px;
      animation: card-enter 1.05s var(--ease-out) 0.12s both;
    }

    .card-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: conic-gradient(
        from var(--border-angle, 0deg),
        rgba(139, 92, 246, 0.6),
        rgba(34, 211, 238, 0.4),
        rgba(99, 102, 241, 0.5),
        transparent 40%,
        rgba(139, 92, 246, 0.5)
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: border-spin 6s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    .card {
      position: relative;
      padding: clamp(2.25rem, 5.5vw, 3.25rem) clamp(1.75rem, 4.5vw, 3rem);
      border-radius: 29px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 0 60px -10px rgba(139, 92, 246, 0.2) inset,
        0 32px 64px -16px rgba(0, 0, 0, 0.65),
        0 0 100px -30px var(--purple-shadow);
      transform-style: preserve-3d;
      transition:
        transform 0.5s var(--ease-spring),
        box-shadow 0.5s ease;
      overflow: hidden;
    }

    .card__inner-glow {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 80px -40px rgba(139, 92, 246, 0.15);
      pointer-events: none;
    }

    .card__shine {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 80%;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255, 255, 255, 0.03) 48%,
        rgba(255, 255, 255, 0.06) 50%,
        rgba(255, 255, 255, 0.03) 52%,
        transparent 60%
      );
      transform: rotate(-8deg);
      pointer-events: none;
    }

    @media (hover: hover) and (pointer: fine) {
      .card-wrap {
        --rx: 0deg;
        --ry: 0deg;
      }

      .card-wrap:hover .card {
        transform: rotateX(var(--rx, 5deg)) rotateY(var(--ry, -7deg)) translateZ(18px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 0 80px -15px rgba(139, 92, 246, 0.25) inset,
          0 48px 80px -20px rgba(0, 0, 0, 0.7),
          0 0 120px -20px rgba(99, 102, 241, 0.45),
          0 0 80px -10px rgba(34, 211, 238, 0.2);
      }
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(56px) scale(0.94);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo */
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
      animation: fade-up 0.9s var(--ease-out) 0.3s both;
    }

    .logo-img-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .logo-img-wrap::before {
      content: "";
      position: absolute;
      inset: -28%;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(139, 92, 246, 0.35) 0%,
        rgba(99, 102, 241, 0.15) 40%,
        transparent 70%
      );
      animation: logo-back-pulse 4s ease-in-out infinite;
      z-index: 0;
    }

    .logo-img-wrap::after {
      content: "";
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.12) 0%, transparent 65%);
      animation: logo-back-pulse 4s ease-in-out infinite reverse;
      z-index: 0;
    }

    @keyframes logo-back-pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.92); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .logo-img {
      position: relative;
      z-index: 1;
      display: block;
      width: clamp(8.75rem, 30vw, 12rem);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 12px 40px rgba(139, 92, 246, 0.35));
    }

    /* Typography */
    h1 {
      font-size: clamp(1.4rem, 4.8vw, 2rem);
      font-weight: 800;
      line-height: 1.5;
      letter-spacing: -0.01em;
      text-align: center;
      background: linear-gradient(
        165deg,
        #ffffff 0%,
        #f1f5f9 35%,
        var(--silver) 70%,
        var(--gold-soft) 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fade-up 0.9s var(--ease-out) 0.45s both;
    }

    .subtitle {
      margin-top: 1.15rem;
      font-size: clamp(0.95rem, 2.9vw, 1.12rem);
      font-weight: 400;
      line-height: 1.85;
      letter-spacing: 0.01em;
      text-align: center;
      color: var(--text-muted);
      max-width: 36ch;
      margin-inline: auto;
      animation: fade-up 0.9s var(--ease-out) 0.58s both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem auto;
      width: min(100%, 14rem);
      border: none;
      background: none;
      animation: fade-up 0.9s var(--ease-out) 0.68s both;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
    }

    .divider span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.5);
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(32px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Modern glowing CTA */
    .cta-wrap {
      display: flex;
      justify-content: center;
      animation: fade-up 0.9s var(--ease-out) 0.78s both;
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 1rem 2.75rem;
      font-family: inherit;
      font-size: clamp(1rem, 2.8vw, 1.08rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: default;
      background: linear-gradient(
        135deg,
        var(--indigo) 0%,
        var(--violet) 45%,
        #7c3aed 100%
      );
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12) inset,
        0 8px 32px -4px rgba(99, 102, 241, 0.5),
        0 0 48px -8px rgba(139, 92, 246, 0.6);
      overflow: hidden;
      isolation: isolate;
      animation: cta-shadow-pulse 3s ease-in-out infinite;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 0%,
        rgba(255, 255, 255, 0.25) 45%,
        transparent 55%
      );
      transform: translateX(-120%);
      animation: cta-shimmer 3.5s ease-in-out infinite;
    }

    .cta::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 17px;
      background: linear-gradient(
        135deg,
        var(--indigo),
        var(--cyan),
        var(--violet),
        var(--indigo)
      );
      background-size: 300% 300%;
      z-index: -2;
      animation: cta-gradient-flow 4s ease infinite;
      opacity: 0.85;
    }

    .cta-inner {
      position: absolute;
      inset: 2px;
      border-radius: 12px;
      background: linear-gradient(
        135deg,
        #4f46e5 0%,
        #7c3aed 50%,
        #6366f1 100%
      );
      z-index: -1;
    }

    .cta-glow {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.2), transparent 60%);
      pointer-events: none;
    }

    @keyframes cta-shimmer {
      0%, 100% { transform: translateX(-120%); }
      45%, 55% { transform: translateX(120%); }
    }

    @keyframes cta-gradient-flow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes cta-shadow-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.12) inset,
          0 8px 32px -4px rgba(99, 102, 241, 0.45),
          0 0 40px -8px rgba(139, 92, 246, 0.5);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.18) inset,
          0 12px 40px -4px rgba(99, 102, 241, 0.65),
          0 0 56px -4px rgba(34, 211, 238, 0.35);
      }
    }

    .cta-dots {
      display: inline-flex;
      gap: 0.15em;
      margin-inline-start: 0.1em;
    }

    .cta-dots span {
      animation: dot-bounce 1.5s ease-in-out infinite;
    }

    .cta-dots span:nth-child(2) { animation-delay: 0.12s; }
    .cta-dots span:nth-child(3) { animation-delay: 0.24s; }

    @keyframes dot-bounce {
      0%, 70%, 100% { transform: translateY(0); opacity: 0.45; }
      35% { transform: translateY(-5px); opacity: 1; }
    }

    footer {
      position: relative;
      z-index: 2;
      margin-top: clamp(2rem, 5vw, 3.25rem);
      text-align: center;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.4);
      animation: fade-up 0.9s var(--ease-out) 0.92s both;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .card-wrap:hover .card {
        transform: none;
      }
    }

    @media (max-width: 380px) {
      .logo-img { width: 7.5rem; }
      .cta { padding-inline: 2rem; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="orb orb--indigo"></div>
    <div class="orb orb--violet"></div>
    <div class="orb orb--cyan"></div>
    <div class="orb orb--accent"></div>
    <div class="scene__grid"></div>
    <div class="scene__noise"></div>
  </div>

  <div class="floats" aria-hidden="true">
    <div class="float float--lg" style="top:10%;right:6%;--size:72px;--dur:18s;--delay:0s;--peak:0.4"></div>
    <div class="float float--sm" style="top:28%;left:12%;--dur:12s;--delay:1s"></div>
    <div class="float float--dash" style="top:20%;right:22%;--size:56px;--dur:14s;--delay:2.5s;--peak:0.35"></div>
    <div class="float float--lg" style="bottom:30%;left:5%;--size:48px;--dur:16s;--delay:3s;--peak:0.3"></div>
    <div class="float float--sm" style="bottom:22%;right:15%;--dur:11s;--delay:4s"></div>
    <div class="float float--sm" style="top:58%;right:8%;--size:8px;--dur:13s;--delay:1.5s"></div>
    <div class="float float--dash" style="bottom:18%;left:28%;--size:40px;--dur:17s;--delay:5s;--peak:0.25"></div>
  </div>

  <main>
    <p class="badge-top">MM IRAQ — بەم زووانە</p>

    <article class="card-wrap" id="cardWrap">
      <div class="card-shell">
        <div class="card" id="heroCard">
          <div class="card__inner-glow" aria-hidden="true"></div>
          <div class="card__shine" aria-hidden="true"></div>

      var wrap = document.getElementById("cardWrap");
