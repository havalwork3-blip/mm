<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MM IRAQ — بازرگانی ئێکسسواراتی مۆدێرن و ناوازە" />
  <title>MM IRAQ — بەم زووانە</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preload" href="./logo.png" as="image" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f172a;
      --bg-deep: #020617;
      --gold: #fbbf24;
      --gold-light: #fde68a;
      --gold-glow: rgba(251, 191, 36, 0.45);
      --indigo: #6366f1;
      --indigo-deep: #4338ca;
      --slate: #94a3b8;
      --card-bg: rgba(15, 23, 42, 0.72);
      --card-border: rgba(251, 191, 36, 0.22);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      font-family: "Noto Sans Arabic", system-ui, sans-serif;
      background: var(--bg-deep);
      color: #f8fafc;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Mesh gradient backdrop ── */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.28) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 85% 75%, rgba(251, 191, 36, 0.14) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(67, 56, 202, 0.2) 0%, transparent 45%),
        linear-gradient(165deg, var(--bg-deep) 0%, var(--bg) 40%, #1e1b4b 100%);
    }

    .backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 45%, black 20%, transparent 75%);
      pointer-events: none;
    }

    /* Animated mesh orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: orb-drift 18s ease-in-out infinite;
    }

    .orb--1 {
      width: min(55vw, 420px);
      height: min(55vw, 420px);
      top: -8%;
      right: -5%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.7), transparent 70%);
      animation-delay: 0s;
    }

    .orb--2 {
      width: min(45vw, 340px);
      height: min(45vw, 340px);
      bottom: 5%;
      left: -8%;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.35), transparent 70%);
      animation-delay: -6s;
    }

    .orb--3 {
      width: min(35vw, 260px);
      height: min(35vw, 260px);
      top: 45%;
      left: 40%;
      background: radial-gradient(circle, rgba(67, 56, 202, 0.5), transparent 70%);
      animation-delay: -12s;
    }

    @keyframes orb-drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -25px) scale(1.06); }
      66% { transform: translate(-20px, 20px) scale(0.94); }
    }

    /* Floating accessory shapes */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      opacity: 0;
      animation: float-shimmer var(--dur, 14s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .particle--ring {
      width: var(--size, 48px);
      height: var(--size, 48px);
      border: 2px solid rgba(251, 191, 36, 0.35);
      border-radius: 50%;
      box-shadow: 0 0 24px rgba(251, 191, 36, 0.12);
    }

    .particle--diamond {
      width: var(--size, 32px);
      height: var(--size, 32px);
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.25), rgba(99, 102, 241, 0.2));
      transform: rotate(45deg);
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
    }

    .particle--dot {
      width: var(--size, 8px);
      height: var(--size, 8px);
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--gold-glow);
    }

    .particle--line {
      width: 2px;
      height: var(--size, 60px);
      background: linear-gradient(180deg, transparent, rgba(251, 191, 36, 0.4), transparent);
    }

    @keyframes float-shimmer {
      0% {
        opacity: 0;
        transform: translateY(20px) rotate(0deg);
      }
      10% { opacity: var(--peak, 0.7); }
      50% {
        opacity: var(--peak, 0.5);
        transform: translateY(-40px) rotate(180deg);
      }
      90% { opacity: var(--peak, 0.3); }
      100% {
        opacity: 0;
        transform: translateY(-80px) rotate(360deg);
      }
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 4vw, 2.5rem);
    }

    /* ── Brand card with 3D tilt ── */
    .card-wrap {
      perspective: 1200px;
      width: min(100%, 560px);
    }

    .card {
      position: relative;
      padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.75rem);
      border-radius: 28px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 25px 50px -12px rgba(0, 0, 0, 0.55),
        0 0 80px -20px rgba(99, 102, 241, 0.25);
      transform-style: preserve-3d;
      transition:
        transform 0.45s cubic-bezier(0.23, 1, 0.32, 1),
        box-shadow 0.45s ease;
      animation: card-enter 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(251, 191, 36, 0.5) 0%,
        rgba(99, 102, 241, 0.2) 40%,
        transparent 60%,
        rgba(251, 191, 36, 0.25) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.85;
    }

    @media (hover: hover) and (pointer: fine) {
      .card-wrap:hover .card {
        transform: rotateX(4deg) rotateY(-6deg) translateZ(12px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06) inset,
          0 35px 60px -15px rgba(0, 0, 0, 0.6),
          0 0 100px -15px var(--gold-glow),
          0 0 120px -30px rgba(99, 102, 241, 0.35);
      }
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(48px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Brand logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.75rem;
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    .logo-img-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .logo-img-wrap::after {
      content: "";
      position: absolute;
      inset: -12%;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, transparent 65%);
      animation: logo-pulse 3.5s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes logo-pulse {
      0%, 100% { opacity: 0.45; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .logo-img {
      position: relative;
      z-index: 1;
      display: block;
      width: clamp(8.5rem, 32vw, 11.5rem);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 28px rgba(251, 191, 36, 0.22));
    }

    /* Typography */
    h1 {
      font-size: clamp(1.35rem, 4.5vw, 1.85rem);
      font-weight: 700;
      line-height: 1.55;
      text-align: center;
      background: linear-gradient(180deg, #fff 0%, #e2e8f0 55%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
    }

    .subtitle {
      margin-top: 1.1rem;
      font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      font-weight: 400;
      line-height: 1.75;
      text-align: center;
      color: var(--slate);
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.65s both;
    }

    .divider {
      width: 4rem;
      height: 2px;
      margin: 1.75rem auto;
      border: none;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.75s both;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* CTA button */
    .cta-wrap {
      display: flex;
      justify-content: center;
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.85s both;
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 2.5rem;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--bg-deep);
      text-decoration: none;
      border: none;
      border-radius: 999px;
      cursor: default;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 45%, #d97706 100%);
      box-shadow:
        0 4px 24px var(--gold-glow),
        0 0 0 1px rgba(255, 255, 255, 0.25) inset;
      overflow: hidden;
      isolation: isolate;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--gold), var(--indigo), var(--gold));
      z-index: -2;
      animation: cta-glow-ring 2.8s ease-in-out infinite;
    }

    .cta::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 45%, #d97706 100%);
      z-index: -1;
    }

    .cta-glow {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.45), transparent 55%);
      animation: cta-pulse 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes cta-glow-ring {
      0%, 100% {
        opacity: 0.6;
        filter: blur(8px);
        transform: scale(1);
      }
      50% {
        opacity: 1;
        filter: blur(14px);
        transform: scale(1.04);
      }
    }

    @keyframes cta-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .cta-dots {
      display: inline-flex;
      gap: 0.2em;
      margin-inline-start: 0.15em;
    }

    .cta-dots span {
      animation: dot-bounce 1.4s ease-in-out infinite;
    }

    .cta-dots span:nth-child(2) { animation-delay: 0.15s; }
    .cta-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* Footer tag */
    footer {
      position: relative;
      z-index: 2;
      margin-top: clamp(2rem, 5vw, 3rem);
      text-align: center;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.45);
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1s both;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .card-wrap:hover .card,
      .card-wrap .card {
        transform: none;
      }
    }

    /* Small phones */
    @media (max-width: 380px) {
      .logo-img {
        width: 7.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <div class="particles" aria-hidden="true">
    <div class="particle particle--ring" style="top:12%;left:8%;--size:56px;--dur:16s;--delay:0s;--peak:0.5"></div>
    <div class="particle particle--diamond" style="top:22%;right:12%;--size:28px;--dur:13s;--delay:2s;--peak:0.6"></div>
    <div class="particle particle--dot" style="top:35%;left:18%;--size:6px;--dur:11s;--delay:1s"></div>
    <div class="particle particle--line" style="top:18%;right:28%;--size:72px;--dur:15s;--delay:3s;--peak:0.4"></div>
    <div class="particle particle--ring" style="bottom:28%;right:6%;--size:40px;--dur:14s;--delay:4s;--peak:0.45"></div>
    <div class="particle particle--diamond" style="bottom:35%;left:10%;--size:36px;--dur:17s;--delay:1.5s;--peak:0.55"></div>
    <div class="particle particle--dot" style="bottom:22%;right:22%;--size:10px;--dur:12s;--delay:5s"></div>
    <div class="particle particle--dot" style="top:55%;left:5%;--size:5px;--dur:10s;--delay:2.5s"></div>
    <div class="particle particle--ring" style="top:65%;right:8%;--size:32px;--dur:18s;--delay:6s;--peak:0.35"></div>
    <div class="particle particle--line" style="bottom:15%;left:25%;--size:48px;--dur:16s;--delay:3.5s;--peak:0.3"></div>
    <div class="particle particle--diamond" style="top:8%;left:42%;--size:20px;--dur:12s;--delay:7s;--peak:0.5"></div>
  </div>

  <main>
    <article class="card-wrap">
      <div class="card">
        <header class="logo">
          <div class="logo-img-wrap">
            <img class="logo-img" src="./logo.png" alt="MM IRAQ" width="184" height="184" decoding="async" fetchpriority="high" />
          </div>
        </header>

        <h1>بەخێربێن بۆ ماڵپەڕی فەرمی MM IRAQ</h1>
        <p class="subtitle">بۆ بازرگانی ئێکسسواراتی مۆدێرن و ناوازە.</p>

        <hr class="divider" />

        <div class="cta-wrap">
          <span class="cta" role="status" aria-live="polite">
            <span class="cta-glow" aria-hidden="true"></span>
            بەم زووانە
            <span class="cta-dots" aria-hidden="true">
              <span>.</span><span>.</span><span>.</span>
            </span>
          </span>
        </div>
      </div>
    </article>

    <footer>MM IRAQ &mdash; ئێکسسوارات</footer>
  </main>
</body>
</html>
